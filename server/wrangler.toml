name = "flagup-api"
main = "src/index.js"
compatibility_date = "2026-01-01"

# 매주 월요일 00:00 KST (= 일요일 15:00 UTC) 지난주 랭킹 정산
# 주의: Cloudflare 크론은 요일 숫자 0(일요일)을 거부 — SUN 표기 사용
[triggers]
crons = ["0 15 * * SUN"]

[[d1_databases]]
binding = "DB"
database_name = "flagup"
database_id = "773014ae-7760-43f9-8e38-3edeabbba696"

# 토스 로그인(방식 B) 파트너 API 호출용 mTLS 클라이언트 인증서
# env.TOSS_CERT.fetch(...)로 호출 시 클라이언트 인증서가 핸드셰이크에 실림
[[mtls_certificates]]
binding = "TOSS_CERT"
certificate_id = "4ee7ad82-0376-4453-b757-23de79a92024"
